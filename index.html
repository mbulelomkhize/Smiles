<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Sorting Game</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game-container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h1 class="game-title">
            ALGORITHM<br>
            <span>SORTING</span>
        </h1>

        <!-- ALGORITHM -->
        <div class="control-group">

            <h3>CHOOSE ALGORITHM</h3>

            <div class="btn-grid">

                <button id="algo-bubble"
                        class="active"
                        onclick="setAlgorithm('bubble', event)">
                    Bubble Sort
                </button>

                <button id="algo-selection"
                        onclick="setAlgorithm('selection', event)">
                    Selection Sort
                </button>

                <button id="algo-insertion"
                        onclick="setAlgorithm('insertion', event)">
                    Insertion Sort
                </button>

            </div>

        </div>

        <!-- GAME MODE -->
        <div class="control-group">

            <h3>GAME MODE</h3>

            <div class="btn-grid">

                <button id="mode-practice"
                        class="active"
                        onclick="setMode('practice', event)">
                    Practice
                </button>

                <button id="mode-countdown"
                        onclick="setMode('countdown', event)">
                    Countdown
                </button>

            </div>

        </div>

        <!-- LIST TYPE -->
        <div class="control-group">

            <h3>TYPE OF LIST</h3>

            <div class="btn-grid">

                <button id="type-num"
                        class="active"
                        onclick="setListType('numerical', event)">
                    Numerical
                </button>

                <button id="type-alpha"
                        onclick="setListType('alphabetical', event)">
                    Alphabetical
                </button>

            </div>

        </div>

        <!-- SCENARIO -->
        <div class="control-group">

            <h3>SCENARIO</h3>

            <div class="btn-grid">

                <button onclick="generateArray('random')">
                    Average Case
                </button>

                <button onclick="generateArray('sorted')">
                    Best Case
                </button>

                <button onclick="generateArray('reversed')">
                    Worst Case
                </button>

            </div>

        </div>

        <!-- STATS -->
        <div class="stats-panel">

            <p>⚡ Comparisons:
                <span id="comparisons">0</span>
            </p>

            <p>🔄 Swaps:
                <span id="swaps">0</span>
            </p>

            <p>⏱️ Time:
                <span id="timer">00:00</span>
            </p>

        </div>

        <button id="start-btn"
                onclick="startSorting()">
            START GAME ▶
        </button>

        <button id="reset-btn"
                onclick="resetGame()">
            Reset Array 🔄
        </button>

    </div>

    <!-- VISUALIZER -->
    <div class="visualizer-container">

        <div class="robot-helper"
             id="robot-text">

            🤖 <span>Welcome to Algorithm Sorting Game!</span>

        </div>

        <!-- ARRAY -->
        <div id="array-container"></div>

        <!-- BUBBLE SORT CONTROLS (UPDATED) -->
        <div class="interactive-controls">

            <div id="bubble-controls"
                 class="game-buttons">

                <button onclick="movePointerLeft()">
                    ⬅ Left
                </button>

                <button onclick="compareBars(true)">
                    Swap Needed
                </button>

                <button onclick="compareBars(false)">
                    No Swap
                </button>

                <button onclick="movePointerRight()">
                    Right ➡
                </button>

            </div>

            <!-- Selection Sort -->
            <div id="selection-controls"
                 class="game-buttons hidden">

                <button onclick="selectCurrent()">
                    Select Minimum
                </button>

                <button onclick="moveSelectionRight()">
                    Next Item ➡
                </button>

                <button onclick="placeMinimum()">
                    Place Minimum
                </button>

            </div>

            <!-- Insertion Sort -->
            <div id="insertion-controls"
                 class="game-buttons hidden">

                <button onclick="pickKey()">
                    Pick Key
                </button>

                <button onclick="shiftLeft()">
                    Shift Left
                </button>

                <button onclick="insertKey()">
                    Insert Key
                </button>

            </div>

        </div>

        <!-- SPEED -->
        <div class="speed-control">

            <span>⚡ Game Speed:</span>

            <input type="range"
                   id="speed"
                   min="50"
                   max="1000"
                   value="300"
                   style="direction: rtl;">

        </div>

    </div>

</div>

<script src="game.js"></script>

</body>
</html>
